<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>忘记密码 — 外贸雷达</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);
     min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:12px;padding:40px;width:100%;max-width:400px;
      box-shadow:0 20px 60px rgba(0,0,0,.3)}
.brand{text-align:center;font-size:24px;font-weight:800;color:#2563eb;margin-bottom:28px}
h2{font-size:17px;font-weight:600;color:#111827;margin-bottom:8px}
p{font-size:13px;color:#6b7280;margin-bottom:20px;line-height:1.5}
label{font-size:13px;font-weight:500;color:#374151;display:block;margin-bottom:5px}
input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:7px;
      font-size:14px;outline:none;transition:.2s;margin-bottom:14px}
input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn{width:100%;padding:11px;background:#2563eb;color:#fff;border:none;
     border-radius:7px;font-size:15px;font-weight:500;cursor:pointer}
.btn:hover{background:#1d4ed8}
.success{background:#f0fdf4;color:#16a34a;border:1px solid #86efac;
         border-radius:6px;padding:12px 14px;font-size:13px;margin-bottom:16px}
.error{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;
       border-radius:6px;padding:10px 14px;font-size:13px;margin-bottom:16px}
.footer{text-align:center;margin-top:20px;font-size:13px;color:#6b7280}
.footer a{color:#2563eb}
</style>
</head>
<body>
<div class="card">
  <div class="brand">外贸雷达</div>
  <h2>找回密码</h2>
  <p>输入注册邮箱，我们会发送一封重置密码的邮件给您。</p>

  {% if msg %}<div class="success">✅ {{ msg }}</div>{% endif %}
  {% if error %}<div class="error">{{ error }}</div>{% endif %}

  {% if not msg %}
  <form method="POST">
    {{ csrf_field() }}
    <label>注册邮箱</label>
    <input type="email" name="email" placeholder="your@email.com" required autofocus>
    <button class="btn" type="submit">发送重置邮件</button>
  </form>
  {% endif %}

  <div class="footer">
    想起密码了？<a href="/login">返回登录</a>
  </div>
</div>
</body>
</html>
