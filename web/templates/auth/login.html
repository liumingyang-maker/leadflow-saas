<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 — LeadFlow</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);
     min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:12px;padding:40px;width:100%;max-width:400px;
      box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{text-align:center;margin-bottom:28px}
.logo .brand{font-size:28px;font-weight:800;color:#2563eb;letter-spacing:-1px}
.logo .sub{font-size:13px;color:#6b7280;margin-top:4px}
h2{font-size:18px;font-weight:600;margin-bottom:20px;color:#111827}
label{font-size:13px;font-weight:500;color:#374151;display:block;margin-bottom:5px}
input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:7px;
      font-size:14px;outline:none;transition:.2s;margin-bottom:14px}
input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn{width:100%;padding:11px;background:#2563eb;color:#fff;border:none;
     border-radius:7px;font-size:15px;font-weight:500;cursor:pointer;transition:.2s}
.btn:hover{background:#1d4ed8}
.error{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;
       border-radius:6px;padding:10px 14px;font-size:13px;margin-bottom:16px}
.footer{text-align:center;margin-top:20px;font-size:13px;color:#6b7280}
.footer a{color:#2563eb}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="brand">LeadFlow</div>
    <div class="sub">外贸客户智能获取系统</div>
  </div>
  <h2>登录账号</h2>
  {% if request.args.get('reset') %}
  <div style="background:#f0fdf4;color:#16a34a;border:1px solid #86efac;
              border-radius:6px;padding:10px 14px;font-size:13px;margin-bottom:16px">
    ✅ 密码已重置成功，请用新密码登录
  </div>
  {% endif %}
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>邮箱</label>
    <input type="email" id="loginEmail" name="email" value="{{ email or '' }}"
           placeholder="your@email.com" required autofocus>
    <label>密码</label>
    <input type="password" name="password" placeholder="请输入密码" required>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:-8px;margin-bottom:12px">
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#374151;font-weight:400;margin:0;cursor:pointer">
        <input type="checkbox" id="rememberEmail" style="width:auto;margin:0"> 记住账号
      </label>
      <a href="/forgot-password" style="font-size:12px;color:#6b7280">忘记密码？</a>
    </div>
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#374151;font-weight:400;margin-bottom:16px;cursor:pointer">
      <input type="checkbox" name="remember_login" id="rememberLogin" style="width:auto;margin:0" checked>
      60 天内免密登录（公用电脑请勿勾选）
    </label>
    <button class="btn" type="submit">登录</button>
  </form>
  <div class="footer">
    还没有账号？<a href="/register">免费试用 14 天</a>
  </div>
</div>
<script>
(function(){
  var emailInput = document.getElementById('loginEmail');
  var remEmail   = document.getElementById('rememberEmail');
  var KEY = 'lf_remember_email';
  // 加载时：之前记住过账号就自动填邮箱并勾上"记住账号"
  try {
    var saved = localStorage.getItem(KEY);
    if (saved) {
      if (!emailInput.value) emailInput.value = saved;
      remEmail.checked = true;
    }
  } catch(e){}
  // 提交时：勾了就存邮箱，没勾就清掉
  var form = emailInput.closest('form');
  if (form) form.addEventListener('submit', function(){
    try {
      if (remEmail.checked) localStorage.setItem(KEY, emailInput.value.trim());
      else localStorage.removeItem(KEY);
    } catch(e){}
  });
})();
</script>
</body>
</html>
