<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>免费注册 — 外贸雷达</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
     min-height:100vh;display:flex;background:#fff;color:#0f172a}
a{text-decoration:none}
.left{flex:1.1;background:linear-gradient(150deg,#1e3a8a 0%,#1e293b 60%,#0f172a 100%);
      color:#fff;padding:48px 52px;display:flex;flex-direction:column;justify-content:center}
.left .brand{font-size:24px;font-weight:800;display:flex;align-items:center;gap:9px;color:#fff}
.left .slogan{font-size:30px;font-weight:800;line-height:1.25;letter-spacing:-.5px;margin:22px 0 10px}
.left .slogan .hl{color:#60a5fa}
.left .desc{font-size:14px;color:#cbd5e1;max-width:420px;margin-bottom:26px}
.feat{display:flex;gap:10px;align-items:flex-start;font-size:14px;color:#e2e8f0;margin-bottom:12px}
.feat .ic{color:#60a5fa;font-weight:700}
.plans{margin-top:30px;display:flex;gap:10px;flex-wrap:wrap}
.plan{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 16px;min-width:120px}
.plan.hot{border-color:#3b82f6;background:rgba(59,130,246,.15)}
.plan .pn{font-size:13px;color:#cbd5e1}
.plan .pp{font-size:20px;font-weight:800;margin-top:2px}
.plan .pp small{font-size:11px;color:#94a3b8;font-weight:400}
.plans-link{margin-top:16px;font-size:13px;color:#93c5fd}
.right{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;background:#f8fafc}
.card{background:#fff;border-radius:14px;padding:40px;width:100%;max-width:410px;
      box-shadow:0 10px 40px rgba(15,23,42,.08);border:1px solid #eef2f7}
.trial-badge{display:inline-block;background:#f0fdf4;color:#16a34a;border:1px solid #86efac;
             border-radius:20px;padding:4px 14px;font-size:12px;font-weight:500;margin-bottom:14px}
.card h2{font-size:21px;font-weight:700;margin-bottom:4px}
.card .sub{font-size:13px;color:#6b7280;margin-bottom:22px}
label{font-size:13px;font-weight:500;color:#374151;display:block;margin-bottom:5px}
input{width:100%;padding:11px 12px;border:1px solid #d1d5db;border-radius:8px;
      font-size:14px;outline:none;transition:.2s;margin-bottom:14px}
input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn{width:100%;padding:12px;background:#16a34a;color:#fff;border:none;border-radius:8px;
     font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
.btn:hover{background:#15803d}
.error{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;border-radius:8px;
       padding:10px 14px;font-size:13px;margin-bottom:14px}
.footer{text-align:center;margin-top:18px;font-size:13px;color:#6b7280}
.footer a{color:#2563eb;font-weight:500}
@media(max-width:820px){
  body{flex-direction:column}
  .left{padding:40px 28px}
  .left .slogan{font-size:24px}
  .plans{display:none}
}
</style>
</head>
<body>
<div class="left">
  <a href="/" class="brand">🛰️ 外贸雷达</a>
  <div class="slogan">几分钟，挖出<br><span class="hl">第一批海外经销商</span></div>
  <div class="desc">竞品在海外的当地经销商，正是你的目标客户。注册即用，平台已为你配好搜索与 AI，无需任何 API Key。</div>
  <div class="feat"><span class="ic">✓</span><span>14 天免费试用专业版全部功能</span></div>
  <div class="feat"><span class="ic">✓</span><span>无需信用卡，零配置开箱即用</span></div>
  <div class="feat"><span class="ic">✓</span><span>渠道雷达 + 找邮箱 + 群发开发信一条龙</span></div>
  <div class="plans">
    <div class="plan"><div class="pn">免费版</div><div class="pp">¥0 <small>永久</small></div></div>
    <div class="plan hot"><div class="pn">专业版</div><div class="pp">¥99 <small>/月 早鸟</small></div></div>
    <div class="plan"><div class="pn">旗舰版</div><div class="pp">¥199 <small>/月</small></div></div>
  </div>
  <a href="/#pricing" class="plans-link">查看各套餐功能区别 →</a>
</div>

<div class="right">
  <div class="card">
    <div class="trial-badge">✨ 免费试用 14 天，无需信用卡</div>
    <h2>创建账号</h2>
    <div class="sub">用邮箱注册，立即开始挖客户</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      {{ csrf_field() }}
      <label>邮箱</label>
      <input type="email" name="email" placeholder="your@company.com" required autofocus>
      <label>密码</label>
      <input type="password" name="password" placeholder="至少 6 位" required>
      <label>确认密码</label>
      <input type="password" name="password2" placeholder="再输一次" required>
      <button class="btn" type="submit">开始免费试用</button>
    </form>
    <div class="footer">
      已有账号？<a href="/login">直接登录</a>
    </div>
  </div>
</div>
</body>
</html>
