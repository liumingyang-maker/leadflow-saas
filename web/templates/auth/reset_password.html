<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>重置密码 — 外贸雷达</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);
     min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:12px;padding:40px;width:100%;max-width:400px;
      box-shadow:0 20px 60px rgba(0,0,0,.3)}
.brand{text-align:center;font-size:24px;font-weight:800;color:#2563eb;margin-bottom:28px}
h2{font-size:17px;font-weight:600;color:#111827;margin-bottom:8px}
p{font-size:13px;color:#6b7280;margin-bottom:20px}
label{font-size:13px;font-weight:500;color:#374151;display:block;margin-bottom:5px}
input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:7px;
      font-size:14px;outline:none;transition:.2s;margin-bottom:14px}
input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn{width:100%;padding:11px;background:#2563eb;color:#fff;border:none;
     border-radius:7px;font-size:15px;font-weight:500;cursor:pointer}
.btn:hover{background:#1d4ed8}
.error{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;
       border-radius:6px;padding:10px 14px;font-size:13px;margin-bottom:16px}
.expired{text-align:center;padding:20px 0}
.expired .icon{font-size:40px;margin-bottom:12px}
.expired p{color:#6b7280;font-size:14px}
.footer{text-align:center;margin-top:20px;font-size:13px;color:#6b7280}
.footer a{color:#2563eb}
</style>
</head>
<body>
<div class="card">
  <div class="brand">外贸雷达</div>

  {% if expired %}
  <div class="expired">
    <div class="icon">⏰</div>
    <h2 style="margin-bottom:10px">链接已失效</h2>
    <p>{{ error }}</p>
  </div>
  <div class="footer">
    <a href="/forgot-password">重新发送重置邮件</a>
  </div>

  {% else %}
  <h2>设置新密码</h2>
  <p>为 <strong>{{ email }}</strong> 设置新密码</p>

  {% if error %}<div class="error">{{ error }}</div>{% endif %}

  <form method="POST">
    <label>新密码</label>
    <input type="password" name="password" placeholder="至少6位" required autofocus>
    <label>确认新密码</label>
    <input type="password" name="password2" placeholder="再输一次" required>
    <button class="btn" type="submit">确认修改密码</button>
  </form>
  <div class="footer">
    <a href="/login">返回登录</a>
  </div>
  {% endif %}

</div>
</body>
</html>
