<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>入驻设置 — LeadFlow</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:#f4f5f7;min-height:100vh}
.header{background:#1e293b;padding:16px 32px;display:flex;align-items:center;gap:16px}
.header .brand{font-size:18px;font-weight:700;color:#fff}
.steps{display:flex;gap:4px;margin-left:auto}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
          justify-content:center;font-size:12px;font-weight:600}
.step-dot.done{background:#16a34a;color:#fff}
.step-dot.current{background:#2563eb;color:#fff}
.step-dot.future{background:#334155;color:#64748b}
.wrap{max-width:680px;margin:40px auto;padding:0 16px}
.card{background:#fff;border-radius:12px;padding:32px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.step-title{font-size:11px;font-weight:600;color:#2563eb;text-transform:uppercase;
            letter-spacing:.8px;margin-bottom:8px}
h1{font-size:22px;font-weight:700;color:#111827;margin-bottom:6px}
.subtitle{font-size:13px;color:#6b7280;margin-bottom:28px}
label{font-size:13px;font-weight:500;color:#374151;display:block;margin-bottom:5px}
input[type=text],input[type=email],select,textarea{
  width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:7px;
  font-size:14px;outline:none;transition:.2s;font-family:inherit}
input:focus,select:focus,textarea:focus{
  border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-group{margin-bottom:18px}
.hint{font-size:12px;color:#9ca3af;margin-top:4px}
.actions{display:flex;gap:10px;margin-top:28px;align-items:center}
.btn-next{padding:11px 28px;background:#2563eb;color:#fff;border:none;
          border-radius:7px;font-size:15px;font-weight:500;cursor:pointer}
.btn-next:hover{background:#1d4ed8}
.btn-skip{font-size:13px;color:#9ca3af;background:none;border:none;cursor:pointer}
.btn-skip:hover{color:#6b7280}
.progress{height:4px;background:#e2e8f0;border-radius:2px;margin-bottom:28px}
.progress-fill{height:100%;background:#2563eb;border-radius:2px;transition:.3s}
</style>
</head>
<body>
<div class="header">
  <div class="brand">LeadFlow</div>
  <div class="steps">
    {% for i in range(1,6) %}
    <div class="step-dot {{ 'done' if step > i else ('current' if step == i else 'future') }}">
      {{ '✓' if step > i else i }}
    </div>
    {% endfor %}
  </div>
</div>
<div class="wrap">
  <div class="progress">
    <div class="progress-fill" style="width:{{ step * 20 }}%"></div>
  </div>
  <div class="card">
    {% block body %}{% endblock %}
  </div>
</div>
</body>
</html>
