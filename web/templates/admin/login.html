<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>管理员登录 — LeadFlow</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#1e293b;border-radius:12px;padding:40px;width:360px;border:1px solid #334155}
.brand{font-size:20px;font-weight:700;color:#2563eb;margin-bottom:6px}
.sub{font-size:12px;color:#64748b;margin-bottom:28px}
label{font-size:13px;color:#94a3b8;display:block;margin-bottom:5px}
input{width:100%;padding:10px 12px;background:#0f172a;border:1px solid #334155;
      border-radius:6px;font-size:14px;color:#e2e8f0;outline:none;margin-bottom:14px}
input:focus{border-color:#2563eb}
.btn{width:100%;padding:11px;background:#2563eb;color:#fff;border:none;
     border-radius:7px;font-size:14px;font-weight:500;cursor:pointer}
.error{color:#f87171;font-size:13px;margin-bottom:12px}
</style>
</head>
<body>
<div class="card">
  <div class="brand">LeadFlow</div>
  <div class="sub">管理员后台</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>管理员邮箱</label>
    <input type="email" name="email" value="admin@leads.com" required>
    <label>密码</label>
    <input type="password" name="password" placeholder="默认 admin123" required>
    <button class="btn" type="submit">登录</button>
  </form>
</div>
</body>
</html>
