<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>修改管理员密码 - 外贸雷达</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#1e293b;border-radius:12px;padding:40px;width:380px;border:1px solid #334155}
.brand{font-size:20px;font-weight:700;color:#2563eb;margin-bottom:6px}
.sub{font-size:12px;color:#64748b;margin-bottom:28px}
label{font-size:13px;color:#94a3b8;display:block;margin-bottom:5px}
input{width:100%;padding:10px 12px;background:#0f172a;border:1px solid #334155;
      border-radius:6px;font-size:14px;color:#e2e8f0;outline:none;margin-bottom:14px}
input:focus{border-color:#2563eb}
.btn{width:100%;padding:11px;background:#2563eb;color:#fff;border:none;
     border-radius:7px;font-size:14px;font-weight:500;cursor:pointer}
.link{display:block;margin-top:14px;text-align:center;color:#94a3b8;font-size:13px;text-decoration:none}
.error{color:#f87171;font-size:13px;margin-bottom:12px}
</style>
</head>
<body>
<div class="card">
  <div class="brand">外贸雷达</div>
  <div class="sub">请先设置新的管理员密码</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    {{ csrf_field() }}
    <label>新密码</label>
    <input type="password" name="password" autocomplete="new-password" required>
    <label>确认新密码</label>
    <input type="password" name="password2" autocomplete="new-password" required>
    <button class="btn" type="submit">保存并进入后台</button>
  </form>
  <form method="POST" action="{{ url_for('admin_logout') }}">
    {{ csrf_field() }}
    <button class="link" type="submit" style="background:transparent;border:0;width:100%;cursor:pointer">退出登录</button>
  </form>
</div>
</body>
</html>
